AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DocMind — Serverless Document Intelligence Pipeline

#  PARAMETERS 
Parameters:
  ProjectName:
    Type: String
    Default: docmind
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]

#  GLOBALS 
Globals:
  Function:
    Runtime:     python3.11
    Timeout:     60
    MemorySize:  256
    Environment:
      Variables:
        TABLE_NAME:    !Ref DocumentsTable
        UPLOAD_BUCKET: !Ref UploadsBucket

#  RESOURCES 
Resources:

  #  S3: Uploads Bucket 
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-uploads-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            MaxAge: 3600
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            Function: !GetAtt ProcessDocumentFunction.Arn

  #  S3: Frontend Bucket 
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-frontend-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       false
        BlockPublicPolicy:     false
        IgnorePublicAcls:      false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  #  DynamoDB Table 
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-documents"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: doc_id
          AttributeType: S
      KeySchema:
        - AttributeName: doc_id
          KeyType: HASH

  #  Lambda: Process Document 
  ProcessDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-process-document"
      CodeUri:      lambda/
      Handler:      process_document.handler
      Description:  "Triggered by S3 upload; calls Textract; stores in DynamoDB"
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadsBucket
        - TextractPolicy: {}
        - DynamoDBWritePolicy:
            TableName: !Ref DocumentsTable

  # Allow S3 to invoke this Lambda
  ProcessDocumentPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProcessDocumentFunction.Arn
      Action:        lambda:InvokeFunction
      Principal:     s3.amazonaws.com
      SourceArn:     !GetAtt UploadsBucket.Arn

  #  Lambda: Fetch Results 
  FetchResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-fetch-results"
      CodeUri:      lambda/
      Handler:      fetch_results.handler
      Description:  "Called by API Gateway; reads documents from DynamoDB"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
      Events:
        ListDocs:
          Type: Api
          Properties:
            RestApiId: !Ref DocMindApi
            Path:      /documents
            Method:    GET
        GetDoc:
          Type: Api
          Properties:
            RestApiId: !Ref DocMindApi
            Path:      /documents/{doc_id}
            Method:    GET

  #  Lambda: Presign Upload URL 
  PresignFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-presign"
      CodeUri:      lambda/
      Handler:      presign.handler
      Description:  "Returns a presigned S3 URL for direct browser-to-S3 uploads"
      Policies:
        - S3WritePolicy:
            BucketName: !Ref UploadsBucket
      Events:
        Presign:
          Type: Api
          Properties:
            RestApiId: !Ref DocMindApi
            Path:      /presign
            Method:    GET

  #  API Gateway 
  DocMindApi:
    Type: AWS::Serverless::Api
    Properties:
      Name:        !Sub "${ProjectName}-api"
      StageName:   !Ref Environment
      Cors:
        AllowMethods: "'GET,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin:  "'*'"

#  OUTPUTS 
Outputs:
  ApiBaseUrl:
    Description: "API Gateway base URL — paste this into frontend/app.js"
    Value: !Sub "https://${DocMindApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  FrontendUrl:
    Description: "S3 static website URL for the frontend"
    Value: !GetAtt FrontendBucket.WebsiteURL

  UploadsBucketName:
    Description: "S3 bucket for uploaded documents"
    Value: !Ref UploadsBucket

  DynamoDBTable:
    Description: "DynamoDB table name"
    Value: !Ref DocumentsTable
